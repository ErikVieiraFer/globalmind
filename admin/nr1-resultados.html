<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados NR-1 - Admin GlobalMind</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --verde-oliva: #6D7141;
            --verde-oliva-light: #8a8f5a;
            --verde-oliva-dark: #565a34;
            --azul-petroleo: #1E2C36;
            --azul-petroleo-light: #2d4251;
            --bege: #F6F3ED;
            --bege-dark: #E8E4DB;
            --white: #FFFFFF;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --success: #4CAF50;
            --warning: #FACC15;
            --orange: #EA580C;
            --danger: #F44336;
            --info: #3b82f6;

            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'Source Sans 3', -apple-system, sans-serif;

            --shadow-sm: 0 1px 2px rgba(30, 44, 54, 0.05);
            --shadow-md: 0 4px 12px rgba(30, 44, 54, 0.08);
            --shadow-lg: 0 8px 30px rgba(30, 44, 54, 0.12);

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bege);
            color: var(--azul-petroleo);
            min-height: 100vh;
            line-height: 1.6;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--azul-petroleo);
            color: var(--white);
            padding: 2rem 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            padding: 0 1.5rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 1.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: var(--verde-oliva);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 28px;
            height: 28px;
            fill: var(--white);
        }

        .logo-text {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .nav-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.4);
            padding: 0 1.5rem;
            margin-bottom: 0.75rem;
            margin-top: 1.5rem;
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            padding: 0.875rem 1.5rem;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: var(--white);
        }

        .nav-item.active {
            background: rgba(109, 113, 65, 0.3);
            color: var(--white);
            border-left: 3px solid var(--verde-oliva);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            opacity: 0.8;
        }

        .nav-item.active svg {
            opacity: 1;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem 2.5rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--bege-dark);
        }

        .page-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 600;
            color: var(--azul-petroleo);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--gray-600);
            font-size: 1rem;
        }

        /* Select Empresa */
        .select-container {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
        }

        .select-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--azul-petroleo);
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 1rem;
            background: var(--white);
            cursor: pointer;
            appearance: none;
        }

        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--gray-500);
            font-size: 0.75rem;
        }

        .select-wrapper select:focus {
            outline: none;
            border-color: var(--verde-oliva);
        }

        /* Cards Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: var(--white);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .metric-label {
            font-size: 0.85rem;
            color: var(--gray-600);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--azul-petroleo);
        }

        .metric-secondary {
            font-size: 0.875rem;
            color: var(--gray-500);
            margin-top: 0.25rem;
        }

        /* Charts Section */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .chart-header {
            margin-bottom: 1.5rem;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--azul-petroleo);
        }

        .chart-subtitle {
            font-size: 0.875rem;
            color: var(--gray-600);
            margin-top: 0.25rem;
        }

        .chart-container {
            position: relative;
            height: 350px;
        }

        /* Table */
        .table-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
        }

        .table-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .table-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--azul-petroleo);
        }

        .table-container {
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table thead th {
            text-align: left;
            padding: 1rem 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--gray-100);
        }

        .table tbody td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        /* Risk Badge */
        .risk-badge {
            display: inline-block;
            padding: 0.375rem 0.875rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .risk-baixo {
            background: rgba(76, 175, 80, 0.15);
            color: var(--success);
        }

        .risk-moderado {
            background: rgba(250, 204, 21, 0.15);
            color: #A16207;
        }

        .risk-alto {
            background: rgba(234, 88, 12, 0.15);
            color: var(--orange);
        }

        .risk-critico {
            background: rgba(244, 67, 54, 0.15);
            color: var(--danger);
        }

        /* Action Buttons */
        .actions-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        .btn-primary {
            background: var(--verde-oliva);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--verde-oliva-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--gray-200);
            color: var(--azul-petroleo);
        }

        .btn-secondary:hover {
            background: var(--gray-300);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--gray-500);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
            opacity: 0.3;
        }

        .empty-state-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--gray-600);
        }

        .empty-state-text {
            font-size: 1rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--azul-petroleo);
            color: var(--white);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateY(120%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
        }

        .toast svg {
            width: 20px;
            height: 20px;
        }

        /* Loading Spinner */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            border: 3px solid var(--gray-200);
            border-top: 3px solid var(--verde-oliva);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Sidebar overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }
        .sidebar-overlay.active { display: block; }

        /* Mobile header */
        .mobile-header {
            display: none;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            background: var(--white);
            border-bottom: 1px solid var(--bege-dark);
            margin-bottom: 1.5rem;
        }
        .menu-toggle {
            width: 44px;
            height: 44px;
            border: none;
            background: var(--white);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }
        .menu-toggle span {
            display: block;
            width: 20px;
            height: 2px;
            background: var(--azul-petroleo);
            border-radius: 2px;
        }
        .mobile-header-title {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--azul-petroleo);
        }

        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 200;
            }
            .sidebar.open { transform: translateX(0); }
            .main-content {
                margin-left: 0;
            }
            .mobile-header { display: flex; }
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .main-content { padding: 1rem; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .metrics-row { flex-direction: column; }
            .metric-card { width: 100%; }
        }

        @media (max-width: 480px) {
            .actions-bar { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
        }

        /* PDF Content Styles */

        .pdf-header {
            text-align: center;
            border-bottom: 3px solid #6D7141;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .pdf-logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 28px;
            font-weight: 700;
            color: #6D7141;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .pdf-logo-subtitle {
            font-size: 12px;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .pdf-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 20px;
            font-weight: 600;
            color: #1E2C36;
            margin: 20px 0 5px;
        }

        .pdf-subtitle {
            font-size: 13px;
            color: #6c757d;
        }

        .pdf-metrics-grid {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin: 25px 0;
        }

        .pdf-metric-box {
            flex: 1;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .pdf-metric-value {
            font-size: 24px;
            font-weight: 700;
            color: #1E2C36;
        }

        .pdf-metric-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6c757d;
            margin-top: 5px;
        }

        .pdf-section-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 16px;
            font-weight: 600;
            color: #1E2C36;
            margin: 25px 0 15px;
            padding-left: 10px;
            border-left: 4px solid #6D7141;
        }

        .pdf-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 11px;
        }

        .pdf-table th {
            background: #1E2C36;
            color: white;
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pdf-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #e9ecef;
            vertical-align: middle;
        }

        .pdf-table tr:nth-child(even) {
            background: #f8f9fa;
        }

        .pdf-score {
            font-weight: 700;
            font-size: 14px;
        }

        .pdf-bar-container {
            width: 80px;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }

        .pdf-bar {
            height: 100%;
            border-radius: 4px;
        }

        .pdf-risk-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .pdf-risk-baixo {
            background: rgba(76, 175, 80, 0.15);
            color: #4CAF50;
        }

        .pdf-risk-moderado {
            background: rgba(250, 204, 21, 0.15);
            color: #A16207;
        }

        .pdf-risk-alto {
            background: rgba(234, 88, 12, 0.15);
            color: #EA580C;
        }

        .pdf-risk-critico {
            background: rgba(244, 67, 54, 0.15);
            color: #F44336;
        }

        .pdf-charts-row {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            page-break-inside: avoid;
        }

        .pdf-chart-box {
            flex: 1;
            text-align: center;
        }

        .pdf-chart-box img {
            max-width: 100%;
            height: auto;
            max-height: 250px;
        }

        .pdf-chart-caption {
            font-size: 11px;
            color: #6c757d;
            margin-top: 8px;
        }

        .pdf-footer {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #e9ecef;
            text-align: center;
            font-size: 10px;
            color: #6c757d;
        }

        .pdf-footer-brand {
            font-weight: 600;
            color: #6D7141;
        }

        .pdf-risk-summary {
            background: linear-gradient(135deg, #1E2C36 0%, #2d4251 100%);
            color: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }

        .pdf-risk-summary-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .pdf-risk-summary-value {
            font-size: 36px;
            font-weight: 700;
        }

        .pdf-risk-summary-classification {
            margin-top: 10px;
        }

        /* Card Dados do Relatório */
        .dados-relatorio-card {
            background: var(--white);
            border-radius: var(--radius-md);
            padding: 1.25rem 1.5rem;
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            align-items: end;
        }

        .dados-relatorio-card .dr-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.375rem;
        }

        .dados-relatorio-card input {
            width: 100%;
            padding: 0.6rem 0.875rem;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.9rem;
            background: var(--white);
        }

        .dados-relatorio-card input:focus {
            outline: none;
            border-color: var(--verde-oliva);
        }

        .dados-relatorio-card select {
            width: 100%;
            padding: 0.6rem 0.875rem;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.9rem;
            background: var(--white);
            cursor: pointer;
        }

        .dados-relatorio-card select:focus {
            outline: none;
            border-color: var(--verde-oliva);
        }


        .dados-relatorio-titulo {
            grid-column: 1 / -1;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--gray-200);
        }

        /* Setor expandível */
        .setor-expandivel-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .setor-expandivel-header {
            padding: 1.1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.15s;
        }

        .setor-expandivel-header:hover {
            background: var(--gray-100);
        }

        .setor-expandivel-arrow {
            font-size: 1.1rem;
            transition: transform 0.2s;
            color: var(--gray-500);
        }

        .setor-expandivel-content {
            display: none;
            padding: 1.5rem;
            border-top: 1px solid var(--gray-200);
        }

        .setores-titulo {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--azul-petroleo);
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--bege-dark);
        }
    </style>

</head>
<body>
    <div class="app-container">
        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </div>
                    <span class="logo-text">GLOBALMIND</span>
                </div>
            </div>

            <nav>
                <div class="nav-section-title">Menu</div>
                <a href="dashboard.html" class="nav-item">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">

    <script type="module">
        import { checkAdminAuth, logout } from './js/admin.js';
        import { db } from '../js/firebase-config.js';
        import { collection, getDocs, query, where, orderBy } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // Verificar autenticação
        try {
            await checkAdminAuth();
        } catch (error) {
            console.error('Erro na autenticação:', error);
        }

        let pizzaChart = null;

        const TOPICOS = [
            'Assédio',
            'Carga de Trabalho',
            'Reconhecimento',
            'Clima Organizacional',
            'Autonomia',
            'Pressão e Metas',
            'Insegurança',
            'Conflitos',
            'Vida Pessoal'
        ];

        // Carregar empresas (diagnósticos)
        async function loadEmpresas() {
            try {
                console.log('🔍 Carregando empresas...');
                const diagnosticosRef = collection(db, 'diagnosticos');
                const snapshot = await getDocs(diagnosticosRef);

                const empresas = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    empresas.push({
                        id: doc.id,
                        nome: data.nomeEmpresa || 'Sem nome'
                    });
                });

                console.log(`✅ ${empresas.length} empresas encontradas`);

                const select = document.getElementById('empresa-select');

                if (empresas.length === 0) {
                    select.innerHTML = '<option value="">Nenhuma empresa encontrada</option>';
                    return;
                }

                select.innerHTML = '<option value="">Selecione uma empresa...</option>' +
                    empresas.map(e => `<option value="${e.id}">${e.nome}</option>`).join('');

            } catch (error) {
                console.error('❌ Erro ao carregar empresas:', error);
                document.getElementById('empresa-select').innerHTML =
                    '<option value="">Erro ao carregar empresas</option>';
            }
        }

        // Carregar resultados da empresa
        async function loadResultados(empresaId) {
            if (!empresaId) return;

            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = '<div class="loading"><div class="spinner"></div><p>Carregando resultados...</p></div>';

            try {
                console.log('📊 Carregando resultados para empresa:', empresaId);

                // Buscar questionários NR-1
                const q = query(
                    collection(db, 'questionarios_nr1'),
                    where('empresaId', '==', empresaId),
                    orderBy('criadoEm', 'desc')
                );

                const snapshot = await getDocs(q);
                const questionarios = [];
                snapshot.forEach(doc => {
                    questionarios.push({ id: doc.id, ...doc.data() });
                });

                console.log(`✅ ${questionarios.length} questionários encontrados`);

                if (questionarios.length === 0) {
                    contentArea.innerHTML = `
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                            </svg>
                            <div class="empty-state-title">Nenhuma avaliação encontrada</div>
                            <div class="empty-state-text">Esta empresa ainda não possui avaliações NR-1 respondidas pelos colaboradores.</div>
                        </div>
                    `;
                    return;
                }

                // Calcular médias agregadas
                const medias = calcularMediasAgregadas(questionarios);
                console.log('📊 Médias calculadas:', medias);

                // Buscar nome da empresa
                const empresaNome = await getEmpresaNome(empresaId);

                // Armazenar dados para o PDF
                currentEmpresaNome = empresaNome;
                currentQuestionarios = questionarios;
                currentMedias = medias;

                // Renderizar conteúdo
                renderContent(empresaNome, empresaId, questionarios, medias);

            } catch (error) {
                console.error('❌ Erro ao carregar resultados:', error);
                contentArea.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-title">Erro ao carregar dados</div>
                        <div class="empty-state-text">${error.message}</div>
                    </div>
                `;
            }
        }

        // Obter nome da empresa
        async function getEmpresaNome(empresaId) {
            try {
                const select = document.getElementById('empresa-select');
                const option = select.querySelector(`option[value="${empresaId}"]`);
                return option ? option.textContent : 'Empresa';
            } catch (error) {
                return 'Empresa';
            }
        }

        // Calcular médias agregadas
        function calcularMediasAgregadas(questionarios) {
            const somas = {
                assedio: 0,
                carga_trabalho: 0,
                reconhecimento: 0,
                clima_organizacional: 0,
                autonomia: 0,
                pressao_metas: 0,
                inseguranca: 0,
                conflitos: 0,
                vida_pessoal: 0,
                risco_geral: 0
            };

            questionarios.forEach(q => {
                const r = q.resultados;
                somas.assedio += r.assedio || 0;
                somas.carga_trabalho += r.carga_trabalho || 0;
                somas.reconhecimento += r.reconhecimento || 0;
                somas.clima_organizacional += r.clima_organizacional || 0;
                somas.autonomia += r.autonomia || 0;
                somas.pressao_metas += r.pressao_metas || 0;
                somas.inseguranca += r.inseguranca || 0;
                somas.conflitos += r.conflitos || 0;
                somas.vida_pessoal += r.vida_pessoal || 0;
                somas.risco_geral += r.risco_geral || 0;
            });

            const count = questionarios.length;
            return {
                assedio: (somas.assedio / count).toFixed(1),
                carga_trabalho: (somas.carga_trabalho / count).toFixed(1),
                reconhecimento: (somas.reconhecimento / count).toFixed(1),
                clima_organizacional: (somas.clima_organizacional / count).toFixed(1),
                autonomia: (somas.autonomia / count).toFixed(1),
                pressao_metas: (somas.pressao_metas / count).toFixed(1),
                inseguranca: (somas.inseguranca / count).toFixed(1),
                conflitos: (somas.conflitos / count).toFixed(1),
                vida_pessoal: (somas.vida_pessoal / count).toFixed(1),
                risco_geral: (somas.risco_geral / count).toFixed(1)
            };
        }

        // Classificar risco
        function classificarRisco(pontuacao) {
            const valor = parseFloat(pontuacao);
            if (valor <= 2.5) return { nivel: 'baixo', label: 'Baixo Risco', classe: 'risk-baixo' };
            if (valor <= 5.0) return { nivel: 'moderado', label: 'Risco Moderado', classe: 'risk-moderado' };
            if (valor <= 7.5) return { nivel: 'alto', label: 'Risco Alto', classe: 'risk-alto' };
            return { nivel: 'critico', label: 'Risco Crítico', classe: 'risk-critico' };
        }

        // Formatar data
        function formatarData(timestamp) {
            if (!timestamp) return 'N/A';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        // Lista de tópicos usada em várias funções
        const TOPICOS_LISTA = [
            { key: 'assedio', nome: 'Assédio' },
            { key: 'carga_trabalho', nome: 'Carga de Trabalho' },
            { key: 'reconhecimento', nome: 'Reconhecimento' },
            { key: 'clima_organizacional', nome: 'Clima Organizacional' },
            { key: 'autonomia', nome: 'Autonomia' },
            { key: 'pressao_metas', nome: 'Pressão e Metas' },
            { key: 'inseguranca', nome: 'Insegurança' },
            { key: 'conflitos', nome: 'Conflitos' },
            { key: 'vida_pessoal', nome: 'Vida Pessoal' }
        ];

        const FONTE_GERADORA = {
            assedio: 'Relações de Trabalho Abusivas, comunicação violenta e importunação sexual.',
            carga_trabalho: 'Metas irrealistas, Jornadas de Trabalho prolongadas, Horas extras excessivas, má distribuição de Cargos.',
            reconhecimento: 'Gestão Pouco Humanizada, Administração de recursos precária.',
            clima_organizacional: 'Autoritarismo, Gestão centralizadora, Ausência fiscalização de regras de bom convívio.',
            autonomia: 'Gestão Não Humanizada, Escassez de Inteligência Emocional.',
            pressao_metas: 'Gestão não Humanizada, Propósitos financeiros desalinhados com saúde e Bem estar.',
            inseguranca: 'Gestão Não Humanizada, Escassez de Inteligência Emocional para gerenciar conflitos.',
            conflitos: 'Falta de treinamentos, Gestão pouco habilitada, Baixas habilidades de oratória.',
            vida_pessoal: 'Ausência de Propósito pessoal, Falta de tempo, planejamento, incentivo e recursos.'
        };

        const NOME_TOPICO_COMPLETO = {
            assedio: 'Assédio Moral e Sexual',
            carga_trabalho: 'Carga Excessiva de Trabalho',
            reconhecimento: 'Falta de Reconhecimento e Recompensas',
            clima_organizacional: 'Clima Organizacional',
            autonomia: 'Falta Autonomia e Controle sobre o Trabalho',
            pressao_metas: 'Pressão e Metas Irrealistas',
            inseguranca: 'Insegurança e Ameaças',
            conflitos: 'Conflitos Interpessoais e Falta de Comunicação',
            vida_pessoal: 'Alinhamento entre Vida Pessoal e Profissional'
        };


        function calcGravidade(val) {
            const v = parseFloat(val) || 0;
            if (v <= 2.5) return { label: 'Baixa', fill: '00C853', color: '000000' };
            if (v <= 5.0) return { label: 'Média', fill: 'FFEB3B', color: '000000' };
            if (v <= 7.5) return { label: 'Alta',  fill: 'D32F2F', color: 'FFFFFF' };
            return         { label: 'Alta',  fill: '000000', color: 'FFFFFF' };
        }

        function calcMatriz(gravLabel, prob) {
            if (gravLabel === 'Alta'  && prob === 'Alta')  return { label: 'Crítico', fill: '000000', color: 'FFFFFF' };
            if (gravLabel === 'Alta'  && prob === 'Média') return { label: 'Alto',    fill: 'D32F2F', color: 'FFFFFF' };
            if (gravLabel === 'Alta'  && prob === 'Baixa') return { label: 'Médio',   fill: 'FFEB3B', color: '000000' };
            if (gravLabel === 'Média' && prob === 'Alta')  return { label: 'Alto',    fill: 'D32F2F', color: 'FFFFFF' };
            if (gravLabel === 'Média' && prob === 'Média') return { label: 'Médio',   fill: 'FFEB3B', color: '000000' };
            if (gravLabel === 'Média' && prob === 'Baixa') return { label: 'Baixo',   fill: '00C853', color: '000000' };
            if (gravLabel === 'Baixa' && prob === 'Alta')  return { label: 'Médio',   fill: 'FFEB3B', color: '000000' };
            return                                                 { label: 'Baixo',   fill: '00C853', color: '000000' };
        }

        // Helper: gera linhas HTML da tabela de tópicos
        function buildTopicosRows(medias) {
            return TOPICOS_LISTA.map(t => {
                const val = parseFloat(medias[t.key]);
                const r = classificarRisco(val);
                return `<tr>
                    <td>${t.nome}</td>
                    <td><strong>${val.toFixed(1)}</strong></td>
                    <td><span class="risk-badge ${r.classe}">${r.label}</span></td>
                </tr>`;
            }).join('');
        }

        // Renderizar conteúdo
        function renderContent(empresaNome, empresaId, questionarios, medias) {
            const primeiraResposta = questionarios[questionarios.length - 1];
            const ultimaResposta = questionarios[0];
            const riscoGeral = classificarRisco(medias.risco_geral);

            const topicosTableHtml = buildTopicosRows(medias);

            const html = `
                <!-- Card Dados do Relatório -->

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>

                    </button>
                    <button class="btn btn-primary" id="btn-exportar-pdf" onclick="gerarPDFNR1()">

                        </svg>
                        Exportar Word
                    </button>
                </div>

                <!-- Metrics Cards -->
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-label">Total de Respostas</div>
                        <div class="metric-value">${questionarios.length}</div>
                        <div class="metric-secondary">colaboradores</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Risco Geral</div>
                        <div class="metric-value">${medias.risco_geral}</div>
                        <div class="metric-secondary">
                            <span class="risk-badge ${riscoGeral.classe}">${riscoGeral.label}</span>
                        </div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Primeira Resposta</div>
                        <div class="metric-value" style="font-size: 1.5rem;">${formatarData(primeiraResposta.criadoEm)}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Última Resposta</div>
                        <div class="metric-value" style="font-size: 1.5rem;">${formatarData(ultimaResposta.criadoEm)}</div>
                    </div>
                </div>

                <!-- Charts -->
                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="chart-header">
                            <div class="chart-title">Distribuição por Classificação</div>
                            <div class="chart-subtitle">Quantidade de tópicos por nível de risco</div>
                        </div>
                        <div class="chart-container">
                            <canvas id="pizza-chart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-header">
                            <div class="chart-title">Pontuação por Tópico</div>
                            <div class="chart-subtitle">Média agregada e classificação de risco</div>
                        </div>
                        <div style="overflow-y:auto;max-height:350px;">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Tópico</th>
                                        <th>Média</th>
                                        <th>Classificação</th>
                                    </tr>

                <!-- Table Breakdown por Setor -->
                <div class="table-card">

            setTimeout(() => {

        // Renderizar tabela de setores
        function renderSetorTable(questionarios) {
            const setores = {};

            // Agrupar por setor
            questionarios.forEach(q => {
                const setor = q.setor || 'Não informado';
                if (!setores[setor]) {
                    setores[setor] = {
                        count: 0,
                        somas: {
                            assedio: 0, carga_trabalho: 0, reconhecimento: 0,
                            clima_organizacional: 0, autonomia: 0, pressao_metas: 0,
                            inseguranca: 0, conflitos: 0, vida_pessoal: 0, risco_geral: 0
                        }
                    };
                }
                setores[setor].count++;
                const r = q.resultados;
                setores[setor].somas.assedio += r.assedio || 0;
                setores[setor].somas.carga_trabalho += r.carga_trabalho || 0;
                setores[setor].somas.reconhecimento += r.reconhecimento || 0;
                setores[setor].somas.clima_organizacional += r.clima_organizacional || 0;
                setores[setor].somas.autonomia += r.autonomia || 0;
                setores[setor].somas.pressao_metas += r.pressao_metas || 0;
                setores[setor].somas.inseguranca += r.inseguranca || 0;
                setores[setor].somas.conflitos += r.conflitos || 0;
                setores[setor].somas.vida_pessoal += r.vida_pessoal || 0;
                setores[setor].somas.risco_geral += r.risco_geral || 0;
            });

            // Calcular médias e renderizar
            return Object.entries(setores).map(([setor, data]) => {
                const count = data.count;
                const riscoGeral = (data.somas.risco_geral / count).toFixed(1);
                const risco = classificarRisco(riscoGeral);

                // Encontrar tópico crítico
                const topicos = {
                    'Assédio': data.somas.assedio / count,
                    'Carga de Trabalho': data.somas.carga_trabalho / count,
                    'Reconhecimento': data.somas.reconhecimento / count,
                    'Clima Organizacional': data.somas.clima_organizacional / count,
                    'Autonomia': data.somas.autonomia / count,
                    'Pressão e Metas': data.somas.pressao_metas / count,
                    'Insegurança': data.somas.inseguranca / count,
                    'Conflitos': data.somas.conflitos / count,
                    'Vida Pessoal': data.somas.vida_pessoal / count
                };

                const topicoCritico = Object.entries(topicos).reduce((a, b) => a[1] > b[1] ? a : b);

                return `
                    <tr>
                        <td><strong>${setor}</strong></td>
                        <td>${count}</td>
                        <td>${riscoGeral}</td>
                        <td>${topicoCritico[0]} (${topicoCritico[1].toFixed(1)})</td>
                        <td><span class="risk-badge ${risco.classe}">${risco.label}</span></td>
                    </tr>
                `;
            }).join('');
        }

        // Helper: renderiza doughnut em qualquer canvas e retorna instância Chart
        function renderPizzaChartOnCanvas(canvas, medias) {
            const valores = [
                medias.assedio, medias.carga_trabalho, medias.reconhecimento,
                medias.clima_organizacional, medias.autonomia, medias.pressao_metas,
                medias.inseguranca, medias.conflitos, medias.vida_pessoal
            ];
            let baixo = 0, moderado = 0, alto = 0, critico = 0;
            valores.forEach(v => {
                const n = parseFloat(v);
                if (n <= 2.5) baixo++;
                else if (n <= 5.0) moderado++;
                else if (n <= 7.5) alto++;
                else critico++;
            });
            return new Chart(canvas, {
                type: 'doughnut',
                data: {
                    labels: ['Baixo', 'Moderado', 'Alto', 'Crítico'],
                    datasets: [{
                        data: [baixo, moderado, alto, critico],
                        backgroundColor: [
                            'rgba(76, 175, 80, 0.8)',
                            'rgba(250, 204, 21, 0.8)',
                            'rgba(234, 88, 12, 0.8)',
                            'rgba(244, 67, 54, 0.8)'
                        ],
                        borderColor: ['#4CAF50', '#FACC15', '#EA580C', '#F44336'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { padding: 16, font: { size: 13 } } },
                        tooltip: { callbacks: { label: (c) => ` ${c.label}: ${c.raw} tópico${c.raw !== 1 ? 's' : ''}` } }
                    }
                }
            });
        }

        // Garante que o gráfico doughnut do setor está renderizado e retorna o dataURL
        async function garantirGraficoSetor(slug) {
            const data = window.setoresData[slug];
            if (!data) return '';
            // Se o canvas já foi renderizado pelo toggle, usa direto
            const existingCanvas = document.getElementById(`pizza-setor-${slug}`);
            if (existingCanvas && existingCanvas._chartDone) {
                return existingCanvas.toDataURL('image/png', 1.0);
            }
            // Senão, renderiza em canvas temporário
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 280;
            tempCanvas.height = 220;
            document.body.appendChild(tempCanvas);
            let tempChart = null;
            try {
                tempChart = renderPizzaChartOnCanvas(tempCanvas, data.medias);
                await new Promise(r => setTimeout(r, 600));
                return tempCanvas.toDataURL('image/png', 1.0);
            } finally {
                if (tempCanvas.parentNode) document.body.removeChild(tempCanvas);
                if (tempChart) { try { tempChart.destroy(); } catch(e) {} }
            }
        }

                            data: { labels, datasets: [{ data: dados, backgroundColor: cores }] },

                        });
                        await new Promise(r => setTimeout(r, 800));
                        const imgData = canvas.toDataURL('image/png');
                        chart.destroy();
                        document.body.removeChild(wrapper);
                        const base64 = imgData.split(',')[1];
                        const binary = atob(base64);
                        const bytes = new Uint8Array(binary.length);
                        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        return bytes.buffer;
                    } catch(e) {
                        console.warn('Gráfico pizza:', e);
                        try { document.body.removeChild(wrapper); } catch(_) {}
                        return null;

                };

                const gerarLegendaImagem = async (itens) => {

                    ctx.fillStyle = '#ffffff';

                        ctx.font = '13px Arial';
                        ctx.fillText(item.label, x + 22, 25);

                    const base64 = imgData.split(',')[1];
                    const binary = atob(base64);

                    const M = { top: 50, bottom: 50, left: 100, right: 100 };
                    const S = { before: 0, after: 0 };
                    const cL = (text, fill, span) => new TableCell(Object.assign({ borders, margins: M, children: [new Paragraph({ spacing: S, children: [new TextRun({ text, bold: true, color: fill === GRN ? WHT : '000000', size: 18 })] })] }, fill ? { shading: { fill, type: 'clear', color: fill } } : {}, span ? { columnSpan: span } : {}));
                    const cV = (text, span) => new TableCell(Object.assign({ borders, margins: M, children: [new Paragraph({ spacing: S, children: [new TextRun({ text: text || '', size: 18 })] })] }, span ? { columnSpan: span } : {}));
                    return new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: [
                        new TableRow({ children: [new TableCell({ columnSpan: 4, borders, margins: M, shading: { fill: GRN, type: 'clear', color: GRN }, children: [new Paragraph({ spacing: S, children: [new TextRun({ text: 'DRPS - DIAGNÓSTICO DE RISCOS PSICOSSOCIAIS', bold: true, color: WHT, size: 22 })], alignment: AlignmentType.CENTER })] })] }),
                        new TableRow({ children: [cL('Psicólogo(a):', BGE), cV(psicologo), cL('CRP:', BGE), cV(crp)] }),
                        new TableRow({ children: [new TableCell({ columnSpan: 4, borders, margins: M, shading: { fill: GRN, type: 'clear', color: GRN }, children: [new Paragraph({ spacing: S, children: [new TextRun({ text: 'IDENTIFICAÇÃO', bold: true, color: WHT, size: 20 })], alignment: AlignmentType.CENTER })] })] }),
                        new TableRow({ children: [cL('CNPJ:', BGE), cV(''), cL('Data:', BGE), cV(mesAno)] }),
                        new TableRow({ children: [cL('Setor:', GRN), cV(setorNome, 3)] }),
                        new TableRow({ children: [cL('Funções:', GRN), cV('', 3)] }),
                        new TableRow({ children: [cL('Quantidade de Colaboradores:', GRN), cV(''), cL('Homens:', GRN), cV('')] }),
                        new TableRow({ children: [cL('Possíveis Agravos à Saúde:', GRN), cV('', 3)] }),
                        new TableRow({ children: [cL('Medidas de Controle:', GRN), cV('', 3)] })
                    ]});
                };

                // Helper: tabela de classificação de risco (Tabela 2, 5 colunas)
                const buildRiscoTable = (m) => {
                    const row1 = new TableRow({ children: [new TableCell({ columnSpan: 5, shading: { fill: '388E3C', type: 'clear', color: '388E3C' }, children: [new Paragraph({ children: [new TextRun({ text: 'Classificação de Risco Psicossocial', bold: true, color: 'FFFFFF', size: 22 })], alignment: AlignmentType.CENTER })] })] });
                    const row2 = new TableRow({ children: [
                        new TableCell({ shading: { fill: '388E3C', type: 'clear', color: '388E3C' }, children: [new Paragraph({ children: [new TextRun({ text: 'Critério', bold: true, color: 'FFFFFF', size: 18 })], alignment: AlignmentType.CENTER })] }),
                        new TableCell({ columnSpan: 4, shading: { fill: '388E3C', type: 'clear', color: '388E3C' }, children: [new Paragraph({ children: [new TextRun({ text: 'Quantitativo e Qualitativo', bold: true, color: 'FFFFFF', size: 18 })], alignment: AlignmentType.CENTER })] })
                    ]});
                    const headerRow = new TableRow({ tableHeader: true, children: ['Fatores de Risco', 'FONTE GERADORA DO RISCO', 'Gravidade (Severidade)', 'Probabilidade de Ocorrência', 'Matriz Risco'].map(text => new TableCell({ shading: { fill: '1B5E20', type: 'clear', color: '1B5E20' }, children: [new Paragraph({ children: [new TextRun({ text, bold: true, color: 'FFFFFF', size: 17 })], alignment: AlignmentType.CENTER })] })) });
                    const dataRows = TOPICOS_LISTA.map(t => {
                        const grav = calcGravidade(parseFloat(m[t.key]) || 0);
                        const prob = 'Média';
                        const probFill = prob === 'Alta' ? 'F44336' : prob === 'Baixa' ? '4CAF50' : 'FFC107';
                        const probColor = prob === 'Média' ? '000000' : 'FFFFFF';
                        const matriz = calcMatriz(grav.label, prob);
                        return new TableRow({ children: [
                            new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: NOME_TOPICO_COMPLETO[t.key] || t.nome, bold: true, size: 17 })] })] }),
                            new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: FONTE_GERADORA[t.key] || '', size: 16 })] })] }),
                            new TableCell({ shading: { fill: grav.fill, type: 'clear', color: grav.fill }, children: [new Paragraph({ children: [new TextRun({ text: grav.label, bold: true, color: grav.color, size: 17 })], alignment: AlignmentType.CENTER })] }),
                            new TableCell({ shading: { fill: probFill, type: 'clear', color: probFill }, children: [new Paragraph({ children: [new TextRun({ text: prob, bold: true, color: probColor, size: 17 })], alignment: AlignmentType.CENTER })] }),
                            new TableCell({ shading: { fill: matriz.fill, type: 'clear', color: matriz.fill }, children: [new Paragraph({ children: [new TextRun({ text: matriz.label, bold: true, color: matriz.color, size: 17 })], alignment: AlignmentType.CENTER })] })
                        ]});
                    });
                    return new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: [row1, row2, headerRow, ...dataRows] });
                };

                const gerarGraficoPizza = async (labels, dados, cores, titulo) => {
                    const wrapper = document.createElement('div');
                    wrapper.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:280px;height:280px;';
                    const canvas = document.createElement('canvas');
                    canvas.width = 280; canvas.height = 280;
                    wrapper.appendChild(canvas);
                    document.body.appendChild(wrapper);
                    try {
                        const chart = new Chart(canvas.getContext('2d'), {
                            type: 'pie',
                            data: { labels, datasets: [{ data: dados, backgroundColor: cores }] },
                            options: { responsive: false, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false }, title: { display: true, text: titulo } } }
                        });
                        await new Promise(r => setTimeout(r, 800));
                        const imgData = canvas.toDataURL('image/png');
                        chart.destroy();
                        document.body.removeChild(wrapper);
                        const base64 = imgData.split(',')[1];
                        const binary = atob(base64);
                        const bytes = new Uint8Array(binary.length);
                        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        return bytes.buffer;
                    } catch(e) {
                        console.warn('Gráfico pizza:', e);
                        try { document.body.removeChild(wrapper); } catch(_) {}
                        return null;
                    }
                };

                const gerarLegendaImagem = async (itens) => {
                    const largura = itens.length * 110;
                    const wrapper = document.createElement('div');
                    wrapper.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:' + largura + 'px;height:40px;';
                    const canvas = document.createElement('canvas');
                    canvas.width = largura; canvas.height = 40;
                    wrapper.appendChild(canvas);
                    document.body.appendChild(wrapper);
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, largura, 40);
                    itens.forEach((item, i) => {
                        const x = i * 110 + 10;
                        ctx.fillStyle = item.cor;
                        ctx.fillRect(x, 12, 16, 16);
                        ctx.fillStyle = '#1E2C36';
                        ctx.font = '13px Arial';
                        ctx.fillText(item.label, x + 22, 25);
                    });
                    await new Promise(r => setTimeout(r, 200));
                    const imgData = canvas.toDataURL('image/png');
                    document.body.removeChild(wrapper);
                    const base64 = imgData.split(',')[1];
                    const binary = atob(base64);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                    return bytes.buffer;
                };

                const buildPizzaCharts = async (mediasSetor, mediasGeral) => {
                    const matrizCounts = { Baixo: 0, Médio: 0, Alto: 0, Crítico: 0 };
                    const gravSetor = { Baixa: 0, Média: 0, Alta: 0 };
                    const gravGeral = { Baixa: 0, Média: 0, Alta: 0 };
                    TOPICOS_LISTA.forEach(t => {
                        const gS = calcGravidade(parseFloat(mediasSetor[t.key]) || 0);
                        const gG = calcGravidade(parseFloat(mediasGeral[t.key]) || 0);
                        const mz = calcMatriz(gS.label, 'Média');
                        matrizCounts[mz.label] = (matrizCounts[mz.label] || 0) + 1;
                        gravSetor[gS.label]++;
                        gravGeral[gG.label]++;
                    });
                    return Promise.all([
                        gerarGraficoPizza(['Baixo','Médio','Alto','Crítico'], [matrizCounts.Baixo,matrizCounts.Médio,matrizCounts.Alto,matrizCounts.Crítico], ['#00C853','#FFEB3B','#D32F2F','#000000'], 'Matriz de Risco'),
                        gerarGraficoPizza(['Baixa','Média','Alta'], [gravSetor.Baixa,gravSetor.Média,gravSetor.Alta], ['#00C853','#FFEB3B','#D32F2F'], 'Gravidade Por Setor'),
                        gerarGraficoPizza(['Baixa','Média','Alta'], [gravGeral.Baixa,gravGeral.Média,gravGeral.Alta], ['#00C853','#FFEB3B','#D32F2F'], 'Gravidade Geral')
                    ]);
                };

                const buildChartsRow = (imgs) => {
                    const cells = imgs.map(img => new TableCell({
                        children: img ? [new Paragraph({ children: [new ImageRun({ data: img, transformation: { width: 180, height: 180 } })], alignment: AlignmentType.CENTER })] : [new Paragraph({ text: '' })],
                        borders: { top: { style: 'none', size: 0, color: 'auto' }, bottom: { style: 'none', size: 0, color: 'auto' }, left: { style: 'none', size: 0, color: 'auto' }, right: { style: 'none', size: 0, color: 'auto' } }
                    }));
                    return new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: [new TableRow({ children: cells })], borders: { top: { style: 'none', size: 0, color: 'auto' }, bottom: { style: 'none', size: 0, color: 'auto' }, left: { style: 'none', size: 0, color: 'auto' }, right: { style: 'none', size: 0, color: 'auto' }, insideH: { style: 'none', size: 0, color: 'auto' }, insideV: { style: 'none', size: 0, color: 'auto' } } });
                };

                // Gerar gráficos antes de montar o doc
                const chartImgsSetor = await buildPizzaCharts(medias, currentMedias);
                const imgLegendaSetor = await gerarLegendaImagem([
                    { cor: '#00C853', label: 'Baixo / Baixa' },
                    { cor: '#FFEB3B', label: 'Médio / Média' },
                    { cor: '#D32F2F', label: 'Alto / Alta' },
                    { cor: '#000000', label: 'Crítico' }
                ]);

                // Análise com gráfico embutido
                const resultadosContent = [
                    titulo('4. Análises e Resultados'),
                    new Paragraph({ children: [new TextRun({ text: txtAnaliseNota, size: 22, italics: true })], spacing: { after: 180 }, alignment: AlignmentType.JUSTIFIED }),
                    buildIdentificacaoTable(setor),
                    branco(),
                    buildRiscoTable(medias),
                    branco(),
                    buildChartsRow(chartImgsSetor),
                    imgLegendaSetor ? new Paragraph({ children: [new ImageRun({ data: imgLegendaSetor, transformation: { width: 400, height: 30 } })], alignment: AlignmentType.CENTER, spacing: { before: 80, after: 200 } }) : branco(),
                    branco()
                ];

                const doc = new Document({
                    sections: [{
                        children: [
                            ...capa,
                            titulo('1. Introdução', true),
                            corpo(txtIntro1),
                            corpo(txtIntro2),
                            corpo(txtIntro3),
                            titulo('2. Objetivo'),
                            corpo(txtObj1),
                            corpo(txtObj2),
                            titulo('3. Metodologia'),
                            corpo(txtMet1),
                            corpo(txtMet1b),
                            subtitulo('Etapas da Metodologia Validada no Diagnóstico:'),
                            corpo(txtMet2a),
                            corpo(txtMet2b),
                            corpo(txtMet2c),
                            corpo(txtMet2d),
                            corpo(txtMet3a),
                            corpo(txtMet3b),
                            subtitulo(txtMet3c),
                            corpo(txtMet3d),
                            corpo(txtMet3e),
                            corpo(txtMet3f),
                            corpo(txtMet3g),
                            corpo(txtMet3h),
                            ...resultadosContent,
                            titulo('5. Conclusão'),
                            corpo(txtConc1),
                            corpo(txtConc2),
                            ...Array.from({ length: 5 }, branco),
                            titulo('6. Assinaturas'),
                            ...linha('Assinatura do Responsável pela Elaboração'),
                            ...linha('Assinatura do Responsável pela Empresa')
                        ]
                    }]
                });

                const blob = await Packer.toBlob(doc);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `relatorio-drps-setor-${slug}-${currentEmpresaNome.toLowerCase().replace(/\s+/g, '-')}.docx`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast(`Word do setor "${setor}" gerado!`);

            } catch(error) {
                console.error('Erro ao gerar Word do setor:', error);
                alert('Erro ao gerar Word: ' + error.message);
            } finally {
                if (btn) { btn.textContent = 'Word'; btn.disabled = false; }
            }
        };

        // Função para gerar PDF NR-1
        window.gerarPDFNR1 = function() {
            if (!currentQuestionarios || currentQuestionarios.length === 0) {
                alert('Selecione uma empresa primeiro.');
                return;
            }
            const dados = {
                empresaNome: currentEmpresaNome,
                medias: currentMedias,
                questionarios: currentQuestionarios,
                tipo: 'geral',
                psicologo: document.getElementById('input-psicologo') ? document.getElementById('input-psicologo').value.trim() : '',
                crp: document.getElementById('input-crp') ? document.getElementById('input-crp').value.trim() : '',
                mesAno: document.getElementById('input-mesano') ? document.getElementById('input-mesano').value.trim() : ''
            };
            sessionStorage.setItem('nr1_dados', JSON.stringify(dados));
            window.open('relatorio-nr1.html', '_blank');
        };

        // Event listeners
        document.getElementById('empresa-select').addEventListener('change', (e) => {
            loadResultados(e.target.value);
        });

        document.getElementById('logout-link').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        // Inicializar
        loadEmpresas();
    </script>
    <script src="js/admin-mobile.js"></script>
</body>
</html>
