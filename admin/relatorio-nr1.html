<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Relatório NR-1 - DRPS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body { font-family: Arial, sans-serif; color: #1E2C36; background: white; }
        @page { size: A4; margin: 15mm; }
        table { width: 100%; border-collapse: collapse; }
        canvas { max-width: 160px !important; max-height: 160px !important; }
        .capa {
            height: 237mm;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            page-break-after: always;
            border-bottom: 3px solid #6D7141;
            padding: 40px;
            box-sizing: border-box;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var raw = sessionStorage.getItem('nr1_dados');
    if (!raw) {
        document.body.innerHTML = '<p style="padding:40px;color:red;">Nenhum dado encontrado. Gere o relatório a partir do painel de resultados.</p>';
        return;
    }

    var d = JSON.parse(raw);
    var empresaNome = d.empresaNome || '';
    var medias = d.medias || {};
    var questionarios = d.questionarios || [];
    var tipo = d.tipo || 'geral';
    var setor = d.setor || '';
    var psicologo = d.psicologo || '';
    var crp = d.crp || '';
    var mesAno = d.mesAno || '';
    var dataLabel = mesAno || new Date().toLocaleDateString('pt-BR');

    var TOPICOS = [
        { key: 'assedio', nome: 'Ass\u00e9dio' },
        { key: 'carga_trabalho', nome: 'Carga de Trabalho' },
        { key: 'reconhecimento', nome: 'Reconhecimento' },
        { key: 'clima_organizacional', nome: 'Clima Organizacional' },
        { key: 'autonomia', nome: 'Autonomia' },
        { key: 'pressao_metas', nome: 'Press\u00e3o e Metas' },
        { key: 'inseguranca', nome: 'Inseguran\u00e7a' },
        { key: 'conflitos', nome: 'Conflitos' },
        { key: 'vida_pessoal', nome: 'Vida Pessoal' }
    ];

    var NOME_TOPICO_COMPLETO = {
        assedio: 'Ass\u00e9dio Moral e Sexual',
        carga_trabalho: 'Carga Excessiva de Trabalho',
        reconhecimento: 'Falta de Reconhecimento e Recompensas',
        clima_organizacional: 'Clima Organizacional',
        autonomia: 'Falta Autonomia e Controle sobre o Trabalho',
        pressao_metas: 'Press\u00e3o e Metas Irrealistas',
        inseguranca: 'Inseguran\u00e7a e Amea\u00e7as',
        conflitos: 'Conflitos Interpessoais e Falta de Comunica\u00e7\u00e3o',
        vida_pessoal: 'Alinhamento entre Vida Pessoal e Profissional'
    };

    var FONTE_GERADORA = {
        assedio: 'Rela\u00e7\u00f5es de Trabalho Abusivas, comunica\u00e7\u00e3o violenta, e importunação sexual.',
        carga_trabalho: 'Metas irrealistas, Jornadas de Trabalho prolongadas, Horas extras excessivas, m\u00e1 distribui\u00e7\u00e3o de Cargos.',
        reconhecimento: 'Gest\u00e3o Pouco Humanizada, Administra\u00e7\u00e3o de recursos prec\u00e1ria.',
        clima_organizacional: 'Autoritarismo, Gest\u00e3o centralizada, Aus\u00eancia fiscaliza\u00e7\u00e3o de regras de bom conv\u00edvio.',
        autonomia: 'Gest\u00e3o N\u00e3o Humanizada, Escassez de Intelig\u00eancia Emocional.',
        pressao_metas: 'Gest\u00e3o n\u00e3o Humanizada, Prop\u00f3sitos financeiros desalinhados com sa\u00fade e Bem estar.',
        inseguranca: 'Gest\u00e3o N\u00e3o Humanizada, Escassez de Intelig\u00eancia Emocional para gerenciar conflitos.',
        conflitos: 'Falta de treinamentos, Gest\u00e3o pouco habilitada, Baixas habilidades de orat\u00f3ria.',
        vida_pessoal: 'Aus\u00eancia de Prop\u00f3sito pessoal, Falta de tempo, planejamento, incentivo e recursos.'
    };

    function classificarRisco(pontuacao) {
        var valor = parseFloat(pontuacao);
        if (valor <= 2.5) return { nivel: 'baixo', label: 'Baixo Risco' };
        if (valor <= 5.0) return { nivel: 'moderado', label: 'Risco Moderado' };
        if (valor <= 7.5) return { nivel: 'alto', label: 'Risco Alto' };
        return { nivel: 'critico', label: 'Risco Cr\u00edtico' };
    }

    function formatarData(ts) {
        if (!ts) return 'N/A';
        var date;
        if (ts && ts.seconds) { date = new Date(ts.seconds * 1000); }
        else { date = new Date(ts); }
        return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function corGrav(val) {
        if (val <= 2.5) return { bg: '#00C853', txt: '#000000', label: 'Baixa' };
        if (val <= 5.0) return { bg: '#FFEB3B', txt: '#000000', label: 'M\u00e9dia' };
        if (val <= 7.5) return { bg: '#D32F2F', txt: '#ffffff', label: 'Alta' };
        return           { bg: '#000000', txt: '#ffffff', label: 'Alta' };
    }

    function corMatriz(val) {
        if (val <= 2.5) return { bg: '#00C853', txt: '#000000', label: 'Baixo' };
        if (val <= 5.0) return { bg: '#FFEB3B', txt: '#000000', label: 'M\u00e9dio' };
        if (val <= 7.5) return { bg: '#D32F2F', txt: '#ffffff', label: 'Alto' };
        return           { bg: '#000000', txt: '#ffffff', label: 'Cr\u00edtico' };
    }

    function corRisco(val) {
        return val <= 2.5 ? '#00C853' : val <= 5.0 ? '#FFEB3B' : val <= 7.5 ? '#D32F2F' : '#000000';
    }

    function buildClassificacaoTable(m) {
        var GRN = '#2E7D32';
        var thStyle = 'padding:7px 8px;border:1px solid #1a5c1a;font-size:10px;font-weight:700;color:#fff;text-align:center;background-color:' + GRN + ';';
        var rows = TOPICOS.map(function(t) {
            var val = parseFloat(m[t.key]) || 0;
            var grav = corGrav(val);
            var matz = corMatriz(val);
            var nomeCompleto = NOME_TOPICO_COMPLETO[t.key] || t.nome;
            var fonte = FONTE_GERADORA[t.key] || '';
            return '<tr>'
                + '<td style="padding:6px 8px;border:1px solid #ccc;font-size:10px;font-weight:700;">' + nomeCompleto + '</td>'
                + '<td style="padding:6px 8px;border:1px solid #ccc;font-size:9px;">' + fonte + '</td>'
                + '<td style="padding:6px 8px;border:1px solid #ccc;font-size:10px;font-weight:700;text-align:center;background-color:' + grav.bg + ';color:' + grav.txt + ';">' + grav.label + '</td>'
                + '<td style="padding:6px 8px;border:1px solid #ccc;font-size:10px;font-weight:700;text-align:center;background-color:#FFEB3B;color:#000000;">M\u00e9dia</td>'
                + '<td style="padding:6px 8px;border:1px solid #ccc;font-size:10px;font-weight:700;text-align:center;background-color:' + matz.bg + ';color:' + matz.txt + ';">' + matz.label + '</td>'
                + '</tr>';
        }).join('');
        return '<table style="width:100%;border-collapse:collapse;margin-bottom:20px;font-size:10px;">'
            + '<thead>'
            + '<tr><th colspan="5" style="' + thStyle + 'font-size:12px;padding:10px;">Classifica\u00e7\u00e3o de Risco Psicossocial</th></tr>'
            + '<tr>'
            + '<th style="' + thStyle + '">Crit\u00e9rio</th>'
            + '<th colspan="4" style="' + thStyle + '">Quantitativo e Qualitativo</th>'
            + '</tr>'
            + '<tr>'
            + '<th style="' + thStyle + '">Fatores de Risco</th>'
            + '<th style="' + thStyle + '">Fonte Geradora do Risco</th>'
            + '<th style="' + thStyle + '">Gravidade (Severidade)</th>'
            + '<th style="' + thStyle + '">Probabilidade de Ocorr\u00eancia</th>'
            + '<th style="' + thStyle + '">Matriz Risco</th>'
            + '</tr>'
            + '</thead>'
            + '<tbody>' + rows + '</tbody>'
            + '</table>';
    }

    var riscoGeral = classificarRisco(medias.risco_geral);
    var html = '';

    // ── Helpers de texto ──────────────────────────────────────────────────
    var sTitulo = function(txt) {
        return '<div style="font-size:16px;font-weight:700;color:#1B5E20;border-left:4px solid #1B5E20;padding-left:10px;margin:20px 0 10px;">' + txt + '</div>';
    };
    var sPara = function(txt) {
        return '<p style="font-size:11px;line-height:1.7;text-align:justify;margin-bottom:10px;color:#1E2C36;">' + txt + '</p>';
    };

    var textoIntroducao =
        sTitulo('1. Introdução')
        + sPara('A avaliação de riscos psicossociais no ambiente de trabalho é uma prática fundamental para garantir a saúde mental dos colaboradores e a qualidade do ambiente organizacional. O termo &ldquo;riscos psicossociais&rdquo; engloba uma série de fatores que podem afetar diretamente o bem-estar psicológico dos trabalhadores, como assédio moral, pressão excessiva, sobrecarga de trabalho, falta de autonomia, isolamento social, e até falta de reconhecimento no trabalho. Esses riscos, se não identificados e tratados de forma eficaz, podem gerar consequências graves, como o burnout, ansiedade, e depressão, além de comprometer a produtividade e aumentar os índices de absenteísmo e rotatividade.')
        + sPara('A NR 01 (Norma Regulamentadora n.º 1) trata especificamente da gestão de riscos psicossociais no ambiente de trabalho, impondo às empresas a necessidade de implementar medidas para identificar, avaliar e mitigar esses riscos. A atualização da norma trouxe um foco maior na prevenção, e as empresas precisam estar em conformidade com essas diretrizes para garantir ambientes de trabalho mais seguros e saudáveis para seus colaboradores.')
        + sPara('Este relatório visa apresentar a metodologia utilizada para a avaliação dos riscos psicossociais nas empresas, com base em escalas e questionários validados e amplamente utilizados na área de psicologia organizacional.');

    var textoObjetivo =
        sTitulo('2. Objetivo')
        + sPara('O objetivo deste relatório é estruturar e sistematizar a análise dos riscos psicossociais nas empresas, com base na aplicação do Diagnóstico de Riscos Psicossociais (DRPS). O relatório visa identificar e classificar os riscos psicossociais identificados nos 9 tópicos principais: assédio moral, pressão e metas, carga excessiva de trabalho, entre outros. O foco principal é avaliar a gravidade e probabilidade desses riscos, sugerindo ações corretivas e preventivas que podem ser implementadas para melhorar o ambiente de trabalho.')
        + sPara('O relatório será adaptado conforme as particularidades de cada empresa, incluindo o setor em que atua, a cultura organizacional e as especificidades do ambiente de trabalho.');

    var textoMetodologia =
        sTitulo('3. Metodologia')
        + sPara('A metodologia validada que seguimos tem uma forte base teórica da psicodinâmica do trabalho, fundamentada por estudiosos como Christophe Dejours e outros. O modelo da escala de Likert foi utilizado para coletar as respostas e gerar escores que indicam as diferentes dimensões do risco psicossocial. As classificações obtidas (Baixo, Médio, Alto, Crítico) fornecem uma visão detalhada sobre os aspectos positivos e negativos do ambiente de trabalho, orientando ações corretivas e preventivas.')
        + sPara('A escala DRPS foi desenvolvida para a identificação e avaliação dos riscos psicossociais, com classificação de respostas de 0 a 4 (sendo 0 = nunca e 4 = sempre). Os resultados são classificados em quatro níveis conforme a matriz de risco NR 01: Baixo (0,0&ndash;3,3), Médio (3,4&ndash;6,6), Alto (6,7&ndash;8,3) e Crítico (8,4&ndash;10,0). A coleta foi realizada on-line, com anonimato e confidencialidade garantidos, em conformidade com a LGPD (Lei n.º 13.709/2018).');

    var textoAnaliseHeader =
        sTitulo('4. Análise de Resultados')
        + '<p style="font-size:11px;line-height:1.7;text-align:justify;margin-bottom:16px;color:#1E2C36;font-style:italic;">(Os dados apresentados a seguir refletem as respostas coletadas dos colaboradores da empresa, processadas automaticamente pelo sistema DRPS conforme a metodologia NR-1.)</p>';

    var textoConclusao =
        sTitulo('5. Conclusão')
        + sPara('A implementação de ações corretivas e preventivas é essencial para minimizar os riscos psicossociais dentro da empresa e promover um ambiente de trabalho mais seguro e saudável. As empresas devem se adequar à NR 01 não apenas para evitar problemas legais, mas também para melhorar a qualidade de vida no trabalho, aumentar a produtividade e reduzir os índices de afastamento.')
        + sPara('A monitorização constante e a adaptação de ações contínuas garantem que a empresa esteja sempre em conformidade com a NR 01 e que os riscos sejam eficazmente mitigados. Recomenda-se que o psicólogo continue acompanhando a evolução da situação e ajustando as intervenções conforme necessário.')
        + '<div style="margin-top:40px;display:flex;justify-content:center;gap:60px;margin-bottom:20px;">'
        + '<div style="text-align:center;"><div style="border-bottom:1px solid #1E2C36;width:220px;margin:0 auto 6px;"></div><div style="font-size:10px;color:#1E2C36;">Assinatura do Responsável pela Elaboração</div></div>'
        + '<div style="text-align:center;"><div style="border-bottom:1px solid #1E2C36;width:220px;margin:0 auto 6px;"></div><div style="font-size:10px;color:#1E2C36;">Assinatura do Responsável pela Empresa</div></div>'
        + '</div>';

    if (tipo === 'geral') {
        var primeiraResposta = questionarios.length ? questionarios[questionarios.length - 1] : null;
        var ultimaResposta = questionarios.length ? questionarios[0] : null;

        // Tabela de setores
        var setoresMap = {};
        questionarios.forEach(function(q) {
            var s = (q.setor) || 'N\u00e3o informado';
            if (!setoresMap[s]) {
                setoresMap[s] = { count: 0, soma: { risco_geral: 0, assedio: 0, carga_trabalho: 0, reconhecimento: 0, clima_organizacional: 0, autonomia: 0, pressao_metas: 0, inseguranca: 0, conflitos: 0, vida_pessoal: 0 } };
            }
            setoresMap[s].count++;
            var r = q.resultados || {};
            Object.keys(setoresMap[s].soma).forEach(function(k) { setoresMap[s].soma[k] += (r[k] || 0); });
        });

        var linhasSetores = Object.entries(setoresMap).map(function(entry) {
            var nome = entry[0];
            var data = entry[1];
            var rg = (data.soma.risco_geral / data.count).toFixed(1);
            var rc = classificarRisco(rg);
            var tops = {
                'Ass\u00e9dio': data.soma.assedio,
                'Carga': data.soma.carga_trabalho,
                'Reconhecimento': data.soma.reconhecimento,
                'Clima': data.soma.clima_organizacional,
                'Autonomia': data.soma.autonomia,
                'Press\u00e3o': data.soma.pressao_metas,
                'Inseguran\u00e7a': data.soma.inseguranca,
                'Conflitos': data.soma.conflitos,
                'Vida Pessoal': data.soma.vida_pessoal
            };
            var critico = Object.entries(tops).reduce(function(a, b) { return a[1] > b[1] ? a : b; });
            var cor = corRisco(parseFloat(rg));
            return '<tr>'
                + '<td style="padding:9px 12px;border-bottom:1px solid #e9ecef;font-size:11px;"><strong>' + nome + '</strong></td>'
                + '<td style="padding:9px 12px;border-bottom:1px solid #e9ecef;text-align:center;font-size:11px;">' + data.count + '</td>'
                + '<td style="padding:9px 12px;border-bottom:1px solid #e9ecef;text-align:center;font-weight:700;font-size:11px;">' + rg + '</td>'
                + '<td style="padding:9px 12px;border-bottom:1px solid #e9ecef;font-size:11px;">' + critico[0] + ' (' + (critico[1] / data.count).toFixed(1) + ')</td>'
                + '<td style="padding:9px 12px;border-bottom:1px solid #e9ecef;"><span style="padding:3px 9px;border-radius:10px;font-size:9px;font-weight:700;text-transform:uppercase;background:' + cor + '22;color:' + cor + ';">' + rc.label + '</span></td>'
                + '</tr>';
        }).join('');

        html =
            // CAPA
            '<div class="capa">'
            + '<div style="font-size:36px;font-weight:700;color:#6D7141;letter-spacing:4px;margin-bottom:8px;">DRPS</div>'
            + '<div style="font-size:11px;color:#6c757d;text-transform:uppercase;letter-spacing:3px;margin-bottom:40px;">Relat\u00f3rio de Avalia\u00e7\u00e3o NR-1</div>'
            + '<div style="width:60px;height:3px;background:#6D7141;margin:0 auto 40px;"></div>'
            + '<div style="font-size:22px;font-weight:700;margin-bottom:10px;">' + empresaNome + '</div>'
            + '<div style="font-size:14px;color:#6c757d;margin-bottom:40px;">Avalia\u00e7\u00e3o de Riscos Psicossociais conforme NR-1</div>'
            + (psicologo ? '<div style="font-size:13px;color:#1E2C36;margin-bottom:6px;">Psic\u00f3logo(a): <strong>' + psicologo + '</strong>' + (crp ? ' \u2014 CRP ' + crp : '') + '</div>' : '')
            + '<div style="font-size:12px;color:#6c757d;margin-top:20px;">' + dataLabel + '</div>'
            + '</div>'

            // TEXTOS INTRODUTÓRIOS
            + textoIntroducao
            + textoObjetivo
            + textoMetodologia
            + textoAnaliseHeader

            // MÉTRICAS
            + '<table style="margin-bottom:20px;table-layout:fixed;">'
            + '<tr>'
            + '<td style="width:25%;padding:0 6px 0 0;"><div style="background:#f8f9fa;border-radius:8px;padding:14px;text-align:center;"><div style="font-size:24px;font-weight:700;">' + questionarios.length + '</div><div style="font-size:9px;text-transform:uppercase;color:#6c757d;margin-top:4px;">Total de Respostas</div></div></td>'
            + '<td style="width:25%;padding:0 6px;"><div style="background:#f8f9fa;border-radius:8px;padding:14px;text-align:center;"><div style="font-size:24px;font-weight:700;">' + medias.risco_geral + '</div><div style="font-size:9px;text-transform:uppercase;color:#6c757d;margin-top:4px;">Risco Geral</div></div></td>'
            + '<td style="width:25%;padding:0 6px;"><div style="background:#f8f9fa;border-radius:8px;padding:14px;text-align:center;"><div style="font-size:13px;font-weight:700;">' + formatarData(primeiraResposta ? primeiraResposta.criadoEm : null) + '</div><div style="font-size:9px;text-transform:uppercase;color:#6c757d;margin-top:4px;">Primeira Resposta</div></div></td>'
            + '<td style="width:25%;padding:0 0 0 6px;"><div style="background:#f8f9fa;border-radius:8px;padding:14px;text-align:center;"><div style="font-size:13px;font-weight:700;">' + formatarData(ultimaResposta ? ultimaResposta.criadoEm : null) + '</div><div style="font-size:9px;text-transform:uppercase;color:#6c757d;margin-top:4px;">\u00daltima Resposta</div></div></td>'
            + '</tr></table>'

            // RISCO GERAL
            + '<div style="background:#1E2C36;color:white;border-radius:10px;padding:20px;text-align:center;margin-bottom:24px;">'
            + '<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:.8;margin-bottom:8px;">Classifica\u00e7\u00e3o de Risco Geral</div>'
            + '<div style="font-size:38px;font-weight:700;">' + medias.risco_geral + '/10</div>'
            + '<div style="margin-top:10px;"><span style="padding:4px 16px;border-radius:12px;font-size:12px;font-weight:700;text-transform:uppercase;background:rgba(255,255,255,.2);">' + riscoGeral.label + '</span></div>'
            + '</div>'

            // GRÁFICOS DE PIZZA
            + '<div id="charts-pizza" style="display:flex;justify-content:center;gap:20px;margin:20px 0;align-items:flex-start;">'
            + '<div style="text-align:center;width:180px;"><div style="font-weight:700;font-size:11px;margin-bottom:6px;">Matriz de Risco</div><canvas id="chart-matriz" width="160" height="160"></canvas></div>'
            + '<div style="text-align:center;width:180px;"><div style="font-weight:700;font-size:11px;margin-bottom:6px;">Gravidade Por Setor</div><canvas id="chart-setor" width="160" height="160"></canvas></div>'
            + '<div style="text-align:center;width:180px;"><div style="font-weight:700;font-size:11px;margin-bottom:6px;">Gravidade Geral</div><canvas id="chart-geral" width="160" height="160"></canvas></div>'
            + '</div>'
            + '<div style="display:flex;justify-content:center;gap:24px;font-size:10px;margin-top:8px;flex-wrap:wrap;margin-bottom:16px;">'
            + '<span><span style="display:inline-block;width:12px;height:12px;background:#00C853;margin-right:4px;vertical-align:middle;border-radius:2px;"></span>Baixo / Baixa</span>'
            + '<span><span style="display:inline-block;width:12px;height:12px;background:#FFEB3B;margin-right:4px;vertical-align:middle;border-radius:2px;"></span>M\u00e9dio / M\u00e9dia</span>'
            + '<span><span style="display:inline-block;width:12px;height:12px;background:#D32F2F;margin-right:4px;vertical-align:middle;border-radius:2px;"></span>Alto / Alta</span>'
            + '<span><span style="display:inline-block;width:12px;height:12px;background:#000000;margin-right:4px;vertical-align:middle;border-radius:2px;"></span>Cr\u00edtico</span>'
            + '</div>'

            // TABELA CLASSIFICAÇÃO DE RISCO
            + buildClassificacaoTable(medias)

            // TABELA SETORES
            + '<div style="font-size:13px;font-weight:600;padding-left:10px;border-left:4px solid #6D7141;margin-bottom:12px;">Detalhamento por Setor</div>'
            + '<table style="font-size:11px;margin-bottom:24px;">'
            + '<thead><tr style="background:#1E2C36;color:white;">'
            + '<th style="padding:10px 12px;text-align:left;">Setor</th>'
            + '<th style="padding:10px 12px;text-align:center;">Respostas</th>'
            + '<th style="padding:10px 12px;text-align:center;">Risco Geral</th>'
            + '<th style="padding:10px 12px;text-align:left;">T\u00f3pico Cr\u00edtico</th>'
            + '<th style="padding:10px 12px;text-align:left;">Classifica\u00e7\u00e3o</th>'
            + '</tr></thead>'
            + '<tbody>' + linhasSetores + '</tbody>'
            + '</table>'

            // CONCLUSÃO
            + textoConclusao

            // RODAPÉ
            + '<div style="padding-top:12px;border-top:1px solid #e9ecef;text-align:center;font-size:10px;color:#6c757d;">'
            + '<strong style="color:#6D7141;">DRPS</strong>'
            + ' \u2014 Avalia\u00e7\u00e3o de Riscos Psicossociais NR-1 | Relat\u00f3rio gerado em ' + new Date().toLocaleDateString('pt-BR')
            + '</div>';

    } else {
        // TIPO SETOR
        var contagem = { baixo: 0, moderado: 0, alto: 0, critico: 0 };
        TOPICOS.forEach(function(t) { contagem[classificarRisco(parseFloat(medias[t.key])).nivel]++; });

        var psicologoHtml = psicologo
            ? '<div style="font-size:13px;color:#1E2C36;margin-bottom:6px;">Psic\u00f3logo(a): <strong>' + psicologo + '</strong>' + (crp ? ' \u2014 CRP ' + crp : '') + '</div>'
            : '';

        html =
            // CAPA
            '<div class="capa">'
            + '<div style="font-size:36px;font-weight:700;color:#6D7141;letter-spacing:4px;margin-bottom:8px;">DRPS</div>'
            + '<div style="font-size:11px;color:#6c757d;text-transform:uppercase;letter-spacing:3px;margin-bottom:40px;">DRPS \u2013 Diagn\u00f3stico de Riscos Psicossociais</div>'
            + '<div style="width:60px;height:3px;background:#6D7141;margin:0 auto 40px;"></div>'
            + '<div style="font-size:20px;font-weight:700;color:#1E2C36;margin-bottom:10px;">' + empresaNome + '</div>'
            + '<div style="font-size:15px;color:#6c757d;margin-bottom:6px;">Setor: <strong style="color:#1E2C36;">' + setor + '</strong></div>'
            + '<div style="font-size:13px;color:#6c757d;margin-bottom:28px;">' + questionarios.length + ' respondente' + (questionarios.length !== 1 ? 's' : '') + '</div>'
            + psicologoHtml
            + '<div style="font-size:12px;color:#6c757d;margin-top:20px;">' + dataLabel + '</div>'
            + '</div>'

            // TEXTOS INTRODUTÓRIOS
            + textoIntroducao
            + textoObjetivo
            + textoMetodologia
            + textoAnaliseHeader

            // MÉTRICAS
            + '<table style="margin-bottom:16px;table-layout:fixed;">'
            + '<tr>'
            + '<td style="width:25%;padding:0 6px 0 0;"><div style="background:#f8f9fa;border-radius:8px;padding:12px;text-align:center;"><div style="font-size:20px;font-weight:700;color:#1E2C36;">' + questionarios.length + '</div><div style="font-size:9px;text-transform:uppercase;letter-spacing:0.5px;color:#6c757d;margin-top:3px;">Respondentes</div></div></td>'
            + '<td style="width:25%;padding:0 6px;"><div style="background:#f8f9fa;border-radius:8px;padding:12px;text-align:center;"><div style="font-size:20px;font-weight:700;color:#1E2C36;">' + medias.risco_geral + '</div><div style="font-size:9px;text-transform:uppercase;letter-spacing:0.5px;color:#6c757d;margin-top:3px;">Risco Geral</div></div></td>'
            + '<td style="width:25%;padding:0 6px;"><div style="background:#f8f9fa;border-radius:8px;padding:12px;text-align:center;"><div style="font-size:13px;font-weight:700;color:#1E2C36;">' + (psicologo || '&mdash;') + '</div><div style="font-size:9px;text-transform:uppercase;letter-spacing:0.5px;color:#6c757d;margin-top:3px;">Psic\u00f3logo(a)</div></div></td>'
            + '<td style="width:25%;padding:0 0 0 6px;"><div style="background:#f8f9fa;border-radius:8px;padding:12px;text-align:center;"><div style="font-size:20px;font-weight:700;color:#1E2C36;">' + (crp || '&mdash;') + '</div><div style="font-size:9px;text-transform:uppercase;letter-spacing:0.5px;color:#6c757d;margin-top:3px;">CRP</div></div></td>'
            + '</tr>'
            + '</table>'

            // RISCO GERAL
            + '<div style="background:#1E2C36;color:white;border-radius:10px;padding:18px;text-align:center;margin-bottom:20px;">'
            + '<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:0.8;margin-bottom:8px;">Classifica\u00e7\u00e3o de Risco Geral \u2014 ' + dataLabel + '</div>'
            + '<div style="font-size:34px;font-weight:700;">' + medias.risco_geral + '/10</div>'
            + '<div style="margin-top:8px;"><span style="display:inline-block;padding:4px 14px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;background:rgba(255,255,255,0.2);">' + riscoGeral.label + '</span></div>'
            + '</div>'

            // DISTRIBUIÇÃO
            + '<div style="font-size:13px;font-weight:600;color:#1E2C36;padding-left:10px;border-left:4px solid #6D7141;margin-bottom:12px;">Distribui\u00e7\u00e3o por N\u00edvel de Risco</div>'
            + '<table style="margin-bottom:20px;font-size:11px;">'
            + '<tr style="background:#1E2C36;color:white;">'
            + '<th style="padding:8px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;">N\u00edvel de Risco</th>'
            + '<th style="padding:8px 12px;text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;width:120px;">Qtde de T\u00f3picos</th>'
            + '</tr>'
            + '<tr style="background:#f8f9fa;"><td style="padding:8px 12px;border-bottom:1px solid #e9ecef;"><span style="color:#2e7d32;font-weight:700;">&#9632;</span> Baixo Risco (0,0\u20132,5)</td><td style="padding:8px 12px;border-bottom:1px solid #e9ecef;text-align:center;font-weight:700;">' + contagem.baixo + '</td></tr>'
            + '<tr><td style="padding:8px 12px;border-bottom:1px solid #e9ecef;"><span style="color:#b45309;font-weight:700;">&#9632;</span> Risco Moderado (2,6\u20135,0)</td><td style="padding:8px 12px;border-bottom:1px solid #e9ecef;text-align:center;font-weight:700;">' + contagem.moderado + '</td></tr>'
            + '<tr style="background:#f8f9fa;"><td style="padding:8px 12px;border-bottom:1px solid #e9ecef;"><span style="color:#c2410c;font-weight:700;">&#9632;</span> Risco Alto (5,1\u20137,5)</td><td style="padding:8px 12px;border-bottom:1px solid #e9ecef;text-align:center;font-weight:700;">' + contagem.alto + '</td></tr>'
            + '<tr><td style="padding:8px 12px;border-bottom:1px solid #e9ecef;"><span style="color:#b91c1c;font-weight:700;">&#9632;</span> Risco Cr\u00edtico (7,6\u201310,0)</td><td style="padding:8px 12px;border-bottom:1px solid #e9ecef;text-align:center;font-weight:700;">' + contagem.critico + '</td></tr>'
            + '</table>'

            // GRÁFICOS DE PIZZA
            + '<div id="charts-pizza" style="display:flex;justify-content:center;gap:20px;margin:20px 0;align-items:flex-start;">'
            + '<div style="text-align:center;width:180px;"><div style="font-weight:700;font-size:11px;margin-bottom:6px;">Matriz de Risco</div><canvas id="chart-matriz" width="160" height="160"></canvas></div>'
            + '<div style="text-align:center;width:180px;"><div style="font-weight:700;font-size:11px;margin-bottom:6px;">Gravidade Por Setor</div><canvas id="chart-setor" width="160" height="160"></canvas></div>'
            + '<div style="text-align:center;width:180px;"><div style="font-weight:700;font-size:11px;margin-bottom:6px;">Gravidade Geral</div><canvas id="chart-geral" width="160" height="160"></canvas></div>'
            + '</div>'
            + '<div style="display:flex;justify-content:center;gap:24px;font-size:10px;margin-top:8px;flex-wrap:wrap;margin-bottom:16px;">'
            + '<span><span style="display:inline-block;width:12px;height:12px;background:#00C853;margin-right:4px;vertical-align:middle;border-radius:2px;"></span>Baixo / Baixa</span>'
            + '<span><span style="display:inline-block;width:12px;height:12px;background:#FFEB3B;margin-right:4px;vertical-align:middle;border-radius:2px;"></span>M\u00e9dio / M\u00e9dia</span>'
            + '<span><span style="display:inline-block;width:12px;height:12px;background:#D32F2F;margin-right:4px;vertical-align:middle;border-radius:2px;"></span>Alto / Alta</span>'
            + '<span><span style="display:inline-block;width:12px;height:12px;background:#000000;margin-right:4px;vertical-align:middle;border-radius:2px;"></span>Cr\u00edtico</span>'
            + '</div>'

            // TABELA CLASSIFICAÇÃO DE RISCO
            + buildClassificacaoTable(medias)

            // CONCLUSÃO
            + textoConclusao

            // RODAPÉ
            + '<div style="padding-top:12px;border-top:1px solid #e9ecef;text-align:center;font-size:10px;color:#6c757d;">'
            + '<strong style="color:#6D7141;">DRPS</strong>'
            + ' \u2014 DRPS \u2013 Diagn\u00f3stico de Riscos Psicossociais | Relat\u00f3rio gerado em ' + new Date().toLocaleDateString('pt-BR')
            + '</div>';
    }

    document.body.innerHTML = html;

    // Renderizar gráficos de pizza após o HTML ser inserido no DOM
    (function() {
        var matrizCounts = { Baixo: 0, Medio: 0, Alto: 0, Critico: 0 };
        var gravCounts   = { Baixa: 0, Media: 0, Alta: 0 };
        TOPICOS.forEach(function(t) {
            var v = parseFloat(medias[t.key]) || 0;
            var g = corGrav(v);
            gravCounts[g.label === 'Baixa' ? 'Baixa' : g.label === 'Média' ? 'Media' : 'Alta']++;
            // Matriz com prob fixa 'Média': Alta→Alto, Média→Médio, Baixa→Baixo
            var mLabel = g.label === 'Alta' ? 'Alto' : g.label === 'Média' ? 'Medio' : 'Baixo';
            matrizCounts[mLabel]++;
        });

        var cMatriz = document.getElementById('chart-matriz');
        var cSetor  = document.getElementById('chart-setor');
        var cGeral  = document.getElementById('chart-geral');
        if (!cMatriz || !cSetor || !cGeral || typeof Chart === 'undefined') return;

        var pieOpts = {
            responsive: false,
            maintainAspectRatio: false,
            animation: false,
            plugins: { legend: { display: false } }
        };

        new Chart(cMatriz.getContext('2d'), {
            type: 'pie',
            data: {
                labels: ['Baixo', 'Médio', 'Alto', 'Crítico'],
                datasets: [{ data: [matrizCounts.Baixo, matrizCounts.Medio, matrizCounts.Alto, matrizCounts.Critico], backgroundColor: ['#00C853', '#FFEB3B', '#D32F2F', '#000000'] }]
            },
            options: pieOpts
        });

        new Chart(cSetor.getContext('2d'), {
            type: 'pie',
            data: {
                labels: ['Baixa', 'Média', 'Alta'],
                datasets: [{ data: [gravCounts.Baixa, gravCounts.Media, gravCounts.Alta], backgroundColor: ['#00C853', '#FFEB3B', '#D32F2F'] }]
            },
            options: pieOpts
        });

        new Chart(cGeral.getContext('2d'), {
            type: 'pie',
            data: {
                labels: ['Baixa', 'Média', 'Alta'],
                datasets: [{ data: [gravCounts.Baixa, gravCounts.Media, gravCounts.Alta], backgroundColor: ['#00C853', '#FFEB3B', '#D32F2F'] }]
            },
            options: pieOpts
        });
    })();

    setTimeout(function() { window.print(); }, 1200);
});
</script>
</body>
</html>
